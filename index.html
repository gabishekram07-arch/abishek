<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Movie Ticket Booking System</title>

<style>
body{
    background:black;
    color:#00ff00;
    font-family:monospace;
    text-align:center;
}

h1{
    color:white;
}

#output{
    width:80%;
    height:400px;
    margin:auto;
    border:2px solid #00ff00;
    padding:10px;
    overflow-y:scroll;
    text-align:left;
}

input{
    width:300px;
    padding:10px;
    font-size:16px;
}
</style>

</head>

<body>

<h1>🎬 Movie Ticket Booking System</h1>

<div id="output"></div>

<input id="input" placeholder="Enter input here..." />

<script>

var Module = {
    print: function(text){
        var out = document.getElementById("output");
        out.innerHTML += text + "<br>";
        out.scrollTop = out.scrollHeight;
    },

    printErr: function(text){
        console.error(text);
    }
};

</script>

<script src="movie.js"></script>

</body>
</html>
