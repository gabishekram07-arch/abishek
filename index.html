<!DOCTYPE html>
<html>
<head>
    <title>Movie Ticket System</title>
    <style>
        body {
            background: #1e1e1e;
            font-family: Arial;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        #controls button {
            margin: 8px;
            padding: 12px 20px;
            font-size: 16px;
            background: #444;
            color: white;
            border: none;
            cursor: pointer;
            width: 250px;
        }

        #controls button:hover {
            background: #666;
        }

        #screen {
            margin-top: 20px;
        }

        .seat {
            width: 35px;
            height: 35px;
            margin: 4px;
            display: inline-block;
            background: green;
            cursor: pointer;
        }

        .booked {
            background: red;
            cursor: not-allowed;
        }

        #output {
            margin-top: 20px;
            background: black;
            color: #00ff00;
            height: 200px;
            overflow-y: auto;
            padding: 10px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

<h1>🎬 Movie Ticket System</h1>

<div id="controls">
    <button onclick="viewSeats()">View Shows</button>
    <button onclick="startBooking()">Book Tickets</button>
    <button onclick="searchBooking()">Search Booking</button>
    <button onclick="occupancy()">Occupancy Report</button>
</div>

<div id="screen"></div>

<div id="output"></div>

<script>
var Module = {
    print: function(text) {
        let out = document.getElementById("output");
        out.innerHTML += text + "\n";
        out.scrollTop = out.scrollHeight;
    }
};

// ---- INTERACTION FUNCTIONS ----

function sendInput(val) {
    Module.ccall('processInput', null, ['string'], [val]);
}

function viewSeats() {
    let show = prompt("Enter show (1-3)");
    sendInput("1");
    sendInput(show);
}

function startBooking() {
    let show = prompt("Select show (1-3)");
    let seats = prompt("Number of seats");
    let name = prompt("Customer name");

    sendInput("2");
    sendInput(show);
    sendInput(seats);
    sendInput(name);

    generateSeatUI(parseInt(seats));
}

function searchBooking() {
    let id = prompt("Enter Booking ID");
    sendInput("3");
    sendInput(id);
}

function occupancy() {
    sendInput("4");
}

// ---- SEAT UI ----

function generateSeatUI(count) {
    let screen = document.getElementById("screen");
    screen.innerHTML = "<h3>Select Seats</h3>";

    let selected = [];

    for(let r=0;r<5;r++){
        let rowDiv = document.createElement("div");

        for(let c=1;c<=10;c++){
            let seat = document.createElement("div");
            seat.className = "seat";
            let label = String.fromCharCode(65+r)+c;

            seat.onclick = function(){
                if(selected.length < count){
                    seat.style.background = "yellow";
                    selected.push(label);

                    if(selected.length === count){
                        selected.forEach(s => sendInput(s));
                    }
                }
            };

            rowDiv.appendChild(seat);
        }

        screen.appendChild(rowDiv);
    }
}
</script>

<script src="output.js"></script>

</body>
</html>
