<!DOCTYPE html>
<html>
<head>
    <title>Movie Ticket System</title>

    <style>
        body {
            background: #1e1e1e;
            font-family: Arial;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        #controls button {
            margin: 8px;
            padding: 12px 20px;
            font-size: 16px;
            background: #444;
            color: white;
            border: none;
            cursor: pointer;
            width: 200px;
        }

        #controls button:hover {
            background: #666;
        }

        #output {
            margin: 20px auto;
            width: 80%;
            height: 300px;
            background: black;
            color: #00ff00;
            padding: 10px;
            overflow-y: auto;
            text-align: left;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

<h1>🎬 Movie Ticket System</h1>

<div id="controls">
    <button onclick="viewShows()">View Shows</button>
    <button onclick="bookTickets()">Book Tickets</button>
    <button onclick="searchBooking()">Search Booking</button>
    <button onclick="occupancy()">Occupancy Report</button>
</div>

<div id="output"></div>

<!-- ✅ IMPORTANT: Define Module BEFORE loading output.js -->
<script>
var Module = {
    print: function(text) {
        let out = document.getElementById("output");
        out.innerHTML += text + "\n";
        out.scrollTop = out.scrollHeight;
    },

    printErr: function(text) {
        let out = document.getElementById("output");
        out.innerHTML += text + "\n";
    }
};
</script>

<!-- ✅ Load compiled C code -->
<script src="output.js"></script>

<script>
function sendInput(val) {
    Module.ccall('processInput', null, ['string'], [val]);
}

/* -------- BUTTON FUNCTIONS -------- */

function viewShows() {
    let show = prompt("Enter show number (1-3)");
    sendInput("1");
    sendInput(show);
}

function bookTickets() {
    let show = prompt("Select show (1-3)");
    let seats = prompt("Number of seats");
    let name = prompt("Customer name");

    sendInput("2");
    sendInput(show);
    sendInput(seats);
    sendInput(name);

    // seat selection (manual input for now)
    for (let i = 0; i < seats; i++) {
        let seat = prompt("Enter seat (e.g., A1)");
        sendInput(seat);
    }
}

function searchBooking() {
    let id = prompt("Enter Booking ID");
    sendInput("3");
    sendInput(id);
}

function occupancy() {
    sendInput("4");
}
</script>

</body>
</html>
