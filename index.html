<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Movie Ticket Booking System</title>

<style>
body{
background:black;
color:#00ff00;
font-family:monospace;
}

#terminal{
width:90%;
height:420px;
border:2px solid #00ff00;
padding:10px;
overflow-y:auto;
margin-bottom:10px;
}

#input{
width:90%;
padding:10px;
font-size:16px;
background:black;
color:#00ff00;
border:2px solid #00ff00;
}
</style>

</head>

<body>

<h2>🎬 Movie Ticket Booking System</h2>

<pre id="terminal"></pre>

<input id="input" placeholder="Type input and press Enter">

<script>

var terminal = document.getElementById("terminal");
var input = document.getElementById("input");

var stdinBuffer = [];

var Module = {

print: function(text){
terminal.innerHTML += text + "\n";
terminal.scrollTop = terminal.scrollHeight;
},

printErr: function(text){
console.error(text);
},

stdin: function(){
if(stdinBuffer.length === 0) return null;
return stdinBuffer.shift();
}

};

input.addEventListener("keydown", function(e){

if(e.key === "Enter"){

let value = input.value;

terminal.innerHTML += "> " + value + "\n";

for(let i=0;i<value.length;i++){
stdinBuffer.push(value.charCodeAt(i));
}

stdinBuffer.push(10);

input.value = "";

}

});

</script>

<script src="movie.js"></script>

</body>
</html>
